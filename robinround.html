<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ROBIN ROUND PICKLEBALL</title>
    <link href="https://cdn.jsdelivr.net/npm/@fontsource/roboto@5.1.0/index.css" rel="stylesheet">
    <style>
        :root {
            --primary: #00c853;
            --primary-dark: #009624;
            --accent: #ffd600;
            --accent-orange: #ff6d00;
            --bg-dark: #0a0e17;
            --bg-card: #111827;
            --bg-card-hover: #1a2332;
            --text-primary: #ffffff;
            --text-secondary: #94a3b8;
            --border-color: #1e293b;
            --gradient-1: linear-gradient(135deg, #00c853, #00e676);
            --gradient-2: linear-gradient(135deg, #ffd600, #ffab00);
            --gradient-hero: linear-gradient(135deg, #0a0e17 0%, #1a2332 50%, #0a0e17 100%);
            --shadow-glow: 0 0 30px rgba(0, 200, 83, 0.15);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Roboto', sans-serif;
            background: var(--bg-dark);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Animated Background */
        .bg-pattern {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
            overflow: hidden;
        }

        .bg-pattern::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 20% 50%, rgba(0, 200, 83, 0.05) 0%, transparent 50%),
                        radial-gradient(circle at 80% 20%, rgba(255, 214, 0, 0.05) 0%, transparent 50%),
                        radial-gradient(circle at 40% 80%, rgba(255, 109, 0, 0.03) 0%, transparent 50%);
            animation: bgFloat 20s ease-in-out infinite;
        }

        @keyframes bgFloat {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            33% { transform: translate(30px, -30px) rotate(1deg); }
            66% { transform: translate(-20px, 20px) rotate(-1deg); }
        }

        .container {
            position: relative;
            z-index: 1;
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }

        /* Header */
        .header {
            padding: 30px 0 20px;
            text-align: center;
            position: relative;
        }

        .header::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 80%;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--primary), transparent);
        }

        .logo-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            margin-bottom: 15px;
        }

        .logo-icon {
            width: 80px;
            height: 80px;
            background: var(--gradient-1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 40px rgba(0, 200, 83, 0.3);
            animation: logoPulse 3s ease-in-out infinite;
            position: relative;
            overflow: hidden;
        }

        .logo-icon::before {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            background: linear-gradient(45deg, transparent 30%, rgba(255,255,255,0.2) 50%, transparent 70%);
            animation: shimmer 3s ease-in-out infinite;
        }

        @keyframes shimmer {
            0% { transform: translateX(-100%) translateY(-100%); }
            100% { transform: translateX(100%) translateY(100%); }
        }

        @keyframes logoPulse {
            0%, 100% { transform: scale(1); box-shadow: 0 0 40px rgba(0, 200, 83, 0.3); }
            50% { transform: scale(1.05); box-shadow: 0 0 60px rgba(0, 200, 83, 0.5); }
        }

        .logo-icon svg {
            width: 45px;
            height: 45px;
            fill: white;
            position: relative;
            z-index: 1;
        }

        .title-group h1 {
            font-size: 2.8rem;
            font-weight: 900;
            background: linear-gradient(135deg, #00e676, #ffd600, #ff6d00);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-transform: uppercase;
            letter-spacing: 3px;
            line-height: 1.1;
        }

        .title-group .subtitle {
            font-size: 1rem;
            color: var(--text-secondary);
            letter-spacing: 8px;
            text-transform: uppercase;
            margin-top: 5px;
        }

        /* Tabs */
        .tabs-container {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin: 30px 0;
            flex-wrap: wrap;
        }

        .tab-btn {
            padding: 14px 32px;
            border: 2px solid var(--border-color);
            background: var(--bg-card);
            color: var(--text-secondary);
            font-size: 0.95rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            border-radius: 12px;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        .tab-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
            transition: left 0.5s;
        }

        .tab-btn:hover::before {
            left: 100%;
        }

        .tab-btn:hover {
            border-color: var(--primary);
            color: var(--text-primary);
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0, 200, 83, 0.15);
        }

        .tab-btn.active {
            background: var(--gradient-1);
            border-color: transparent;
            color: var(--bg-dark);
            box-shadow: 0 8px 30px rgba(0, 200, 83, 0.3);
            transform: translateY(-2px);
        }

        .tab-icon {
            margin-right: 8px;
            font-size: 1.1rem;
        }

        /* Tab Content */
        .tab-content {
            display: none;
            animation: fadeInUp 0.6s ease;
        }

        .tab-content.active {
            display: block;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Rankings Table */
        .section-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .section-title {
            font-size: 1.5rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 2px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .section-title .icon {
            width: 40px;
            height: 40px;
            background: var(--gradient-2);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
        }

        .table-wrapper {
            background: var(--bg-card);
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid var(--border-color);
            box-shadow: var(--shadow-glow);
        }

        .data-table {
            width: 100%;
            border-collapse: collapse;
        }

        .data-table thead th {
            background: linear-gradient(135deg, #1a2332, #111827);
            padding: 16px 20px;
            text-align: left;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            font-size: 0.8rem;
            color: var(--primary);
            border-bottom: 2px solid var(--primary);
            position: sticky;
            top: 0;
        }

        .data-table tbody tr {
            border-bottom: 1px solid var(--border-color);
            transition: all 0.3s ease;
        }

        .data-table tbody tr:hover {
            background: var(--bg-card-hover);
            transform: scale(1.005);
        }

        .data-table tbody tr:last-child {
            border-bottom: none;
        }

        .data-table td {
            padding: 14px 20px;
            font-size: 0.95rem;
            color: var(--text-primary);
        }

        /* Rank Badges */
        .rank-badge {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            font-size: 0.85rem;
        }

        .rank-1 { background: linear-gradient(135deg, #ffd700, #ffab00); color: #000; box-shadow: 0 0 20px rgba(255, 215, 0, 0.4); }
        .rank-2 { background: linear-gradient(135deg, #b0bec5, #78909c); color: #000; box-shadow: 0 0 15px rgba(176, 190, 197, 0.3); }
        .rank-3 { background: linear-gradient(135deg, #cd7f32, #a0522d); color: #fff; box-shadow: 0 0 15px rgba(205, 127, 50, 0.3); }
        .rank-default { background: var(--bg-card-hover); color: var(--text-secondary); border: 1px solid var(--border-color); }

        .player-name {
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .player-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary-dark), var(--primary));
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 0.9rem;
            color: white;
            flex-shrink: 0;
        }

        .stat-value {
            font-weight: 700;
            color: var(--accent);
        }

        .stat-win {
            color: var(--primary);
            font-weight: 700;
        }

        .stat-loss {
            color: #ff5252;
            font-weight: 700;
        }

        .win-rate-bar {
            width: 100%;
            height: 6px;
            background: var(--border-color);
            border-radius: 3px;
            overflow: hidden;
            margin-top: 4px;
        }

        .win-rate-fill {
            height: 100%;
            background: var(--gradient-1);
            border-radius: 3px;
            transition: width 1s ease;
        }

        /* Match Schedule */
        .schedule-card {
            background: var(--bg-card);
            border-radius: 16px;
            border: 1px solid var(--border-color);
            margin-bottom: 16px;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .schedule-card:hover {
            border-color: var(--primary);
            box-shadow: var(--shadow-glow);
            transform: translateY(-3px);
        }

        .schedule-header {
            background: linear-gradient(135deg, #1a2332, #111827);
            padding: 14px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 2px solid var(--primary);
        }

        .match-date {
            font-size: 0.85rem;
            color: var(--primary);
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .match-round {
            background: var(--gradient-2);
            color: var(--bg-dark);
            padding: 4px 14px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 800;
            text-transform: uppercase;
        }

        .match-body {
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 15px;
        }

        .team {
            display: flex;
            align-items: center;
            gap: 12px;
            flex: 1;
        }

        .team.right {
            flex-direction: row-reverse;
            text-align: right;
        }

        .team-logo {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
            flex-shrink: 0;
        }

        .team-logo.home {
            background: linear-gradient(135deg, #1565c0, #42a5f5);
        }

        .team-logo.away {
            background: linear-gradient(135deg, #c62828, #ef5350);
        }

        .team-name {
            font-weight: 700;
            font-size: 1rem;
        }

        .team-record {
            font-size: 0.8rem;
            color: var(--text-secondary);
            margin-top: 2px;
        }

        .vs-badge {
            background: var(--gradient-1);
            color: var(--bg-dark);
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            font-size: 0.9rem;
            flex-shrink: 0;
            box-shadow: 0 0 20px rgba(0, 200, 83, 0.3);
        }

        .match-info {
            padding: 0 20px 16px;
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }

        .info-item {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        .info-item .icon {
            font-size: 1rem;
        }

        /* Overview Tab */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: var(--bg-card);
            border-radius: 16px;
            padding: 24px;
            border: 1px solid var(--border-color);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .stat-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 3px;
        }

        .stat-card:nth-child(1)::before { background: var(--gradient-1); }
        .stat-card:nth-child(2)::before { background: var(--gradient-2); }
        .stat-card:nth-child(3)::before { background: linear-gradient(135deg, #ff6d00, #ff9100); }
        .stat-card:nth-child(4)::before { background: linear-gradient(135deg, #651fff, #b388ff); }

        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: var(--shadow-glow);
        }

        .stat-card-label {
            font-size: 0.8rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 8px;
        }

        .stat-card-value {
            font-size: 2.5rem;
            font-weight: 900;
            background: var(--gradient-1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .stat-card-icon {
            position: absolute;
            top: 20px;
            right: 20px;
            font-size: 2rem;
            opacity: 0.2;
        }

        /* Loading */
        .loading-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 60px;
            gap: 20px;
        }

        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 4px solid var(--border-color);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading-text {
            color: var(--text-secondary);
            font-size: 0.9rem;
            letter-spacing: 1px;
        }

        /* Error */
        .error-container {
            text-align: center;
            padding: 40px;
            color: #ff5252;
        }

        .error-container .icon {
            font-size: 3rem;
            margin-bottom: 10px;
        }

        /* Footer */
        .footer {
            text-align: center;
            padding: 30px 0;
            margin-top: 40px;
            border-top: 1px solid var(--border-color);
            color: var(--text-secondary);
            font-size: 0.85rem;
        }

        .footer .brand {
            color: var(--primary);
            font-weight: 700;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .title-group h1 {
                font-size: 1.8rem;
                letter-spacing: 1px;
            }

            .title-group .subtitle {
                font-size: 0.75rem;
                letter-spacing: 4px;
            }

            .logo-icon {
                width: 60px;
                height: 60px;
            }

            .logo-icon svg {
                width: 35px;
                height: 35px;
            }

            .tab-btn {
                padding: 10px 18px;
                font-size: 0.8rem;
                letter-spacing: 1px;
            }

            .data-table td, .data-table th {
                padding: 10px 12px;
                font-size: 0.8rem;
            }

            .match-body {
                flex-direction: column;
                text-align: center;
            }

            .team, .team.right {
                flex-direction: column;
                text-align: center;
            }

            .player-name {
                gap: 8px;
            }

            .player-avatar {
                width: 32px;
                height: 32px;
                font-size: 0.75rem;
            }

            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }

            .stat-card-value {
                font-size: 1.8rem;
            }
        }

        @media (max-width: 480px) {
            .stats-grid {
                grid-template-columns: 1fr;
            }
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg-dark);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border-color);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--primary);
        }

        /* Table scroll wrapper */
        .table-scroll {
            overflow-x: auto;
        }

        /* Top 3 Podium */
        .podium {
            display: flex;
            justify-content: center;
            align-items: flex-end;
            gap: 10px;
            margin-bottom: 30px;
            padding: 20px 0;
        }

        .podium-item {
            text-align: center;
            padding: 15px;
            border-radius: 16px 16px 0 0;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            min-width: 100px;
            transition: all 0.3s ease;
        }

        .podium-item:hover {
            transform: translateY(-5px);
        }

        .podium-item.first {
            height: 160px;
            background: linear-gradient(180deg, rgba(255, 215, 0, 0.1), var(--bg-card));
            border-color: rgba(255, 215, 0, 0.3);
            order: 2;
        }

        .podium-item.second {
            height: 130px;
            background: linear-gradient(180deg, rgba(176, 190, 197, 0.1), var(--bg-card));
            border-color: rgba(176, 190, 197, 0.3);
            order: 1;
        }

        .podium-item.third {
            height: 110px;
            background: linear-gradient(180deg, rgba(205, 127, 50, 0.1), var(--bg-card));
            border-color: rgba(205, 127, 50, 0.3);
            order: 3;
        }

        .podium-rank {
            font-size: 1.5rem;
            margin-bottom: 5px;
        }

        .podium-name {
            font-weight: 700;
            font-size: 0.85rem;
            margin-bottom: 4px;
        }

        .podium-stat {
            font-size: 0.75rem;
            color: var(--text-secondary);
        }

        /* Court lines decoration */
        .court-lines {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 90%;
            height: 60%;
            border: 1px solid rgba(0, 200, 83, 0.03);
            pointer-events: none;
            z-index: 0;
        }

        .court-lines::before {
            content: '';
            position: absolute;
            top: 0;
            left: 50%;
            width: 1px;
            height: 100%;
            background: rgba(0, 200, 83, 0.03);
        }

        .court-lines::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 0;
            width: 100%;
            height: 1px;
            background: rgba(0, 200, 83, 0.03);
        }

        .last-updated {
            text-align: center;
            color: var(--text-secondary);
            font-size: 0.75rem;
            margin-bottom: 15px;
            font-style: italic;
        }
    </style>
</head>
<body>
    <div class="bg-pattern"></div>
    <div class="court-lines"></div>

    <div class="container">
        <!-- Header -->
        <header class="header">
            <div class="logo-container">
                <div class="logo-icon">
                    <svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
                        <circle cx="32" cy="32" r="28" fill="none" stroke="white" stroke-width="3"/>
                        <circle cx="32" cy="32" r="8" fill="white" opacity="0.8"/>
                        <line x1="32" y1="4" x2="32" y2="24" stroke="white" stroke-width="2.5"/>
                        <line x1="32" y1="40" x2="32" y2="60" stroke="white" stroke-width="2.5"/>
                        <line x1="4" y1="32" x2="24" y2="32" stroke="white" stroke-width="2.5"/>
                        <line x1="40" y1="32" x2="60" y2="32" stroke="white" stroke-width="2.5"/>
                        <line x1="12.2" y1="12.2" x2="26.4" y2="26.4" stroke="white" stroke-width="2"/>
                        <line x1="37.6" y1="37.6" x2="51.8" y2="51.8" stroke="white" stroke-width="2"/>
                        <line x1="51.8" y1="12.2" x2="37.6" y2="26.4" stroke="white" stroke-width="2"/>
                        <line x1="26.4" y1="37.6" x2="12.2" y2="51.8" stroke="white" stroke-width="2"/>
                    </svg>
                </div>
                <div class="title-group">
                    <h1>Robin Round<br>Pickleball</h1>
                    <div class="subtitle">League 2026</div>
                </div>
            </div>
        </header>

        <!-- Tabs -->
        <div class="tabs-container">
            <button class="tab-btn active" onclick="switchTab('rankings')">
                <span class="tab-icon">🏆</span> Bảng Xếp Hạng
            </button>
            <button class="tab-btn" onclick="switchTab('schedule')">
                <span class="tab-icon">📅</span> Lịch Đấu
            </button>
            <button class="tab-btn" onclick="switchTab('overview')">
                <span class="tab-icon">📊</span> Tổng Quan
            </button>
        </div>

        <!-- Tab 1: Rankings -->
        <div id="tab-rankings" class="tab-content active">
            <div class="section-header">
                <div class="section-title">
                    <div class="icon">🏆</div>
                    Bảng Xếp Hạng
                </div>
            </div>
            <div class="last-updated" id="rankings-updated"></div>
            <div id="rankings-content">
                <div class="loading-container">
                    <div class="loading-spinner"></div>
                    <div class="loading-text">Đang tải dữ liệu bảng xếp hạng...</div>
                </div>
            </div>
        </div>

        <!-- Tab 2: Schedule -->
        <div id="tab-schedule" class="tab-content">
            <div class="section-header">
                <div class="section-title">
                    <div class="icon">📅</div>
                    Lịch Đấu Đội
                </div>
            </div>
            <div class="last-updated" id="schedule-updated"></div>
            <div id="schedule-content">
                <div class="loading-container">
                    <div class="loading-spinner"></div>
                    <div class="loading-text">Đang tải lịch đấu...</div>
                </div>
            </div>
        </div>

        <!-- Tab 3: Overview -->
        <div id="tab-overview" class="tab-content">
            <div class="section-header">
                <div class="section-title">
                    <div class="icon">📊</div>
                    Tổng Quan Giải Đấu
                </div>
            </div>
            <div id="overview-content">
                <div class="loading-container">
                    <div class="loading-spinner"></div>
                    <div class="loading-text">Đang tải tổng quan...</div>
                </div>
            </div>
        </div>

        <!-- Footer -->
        <footer class="footer">
            <p>© 2026 <span class="brand">ROBIN ROUND PICKLEBALL</span> — Designed for Champions 🏆</p>
        </footer>
    </div>

    <script>
        const SHEET_ID = '1cDNrI43tQApk12oOB_SjQ6aPMcGbd18ToDqWLlfhD-c';
        const BASE_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv`;

        // Fetch CSV and parse
        async function fetchSheetData(sheetName, range) {
            const url = `${BASE_URL}&sheet=${encodeURIComponent(sheetName)}&range=${encodeURIComponent(range)}`;
            try {
                const response = await fetch(url);
                if (!response.ok) throw new Error('Network response was not ok');
                const text = await response.text();
                return parseCSV(text);
            } catch (error) {
                console.error(`Error fetching ${sheetName}:`, error);
                throw error;
            }
        }

        function parseCSV(text) {
            const rows = [];
            let current = '';
            let inQuotes = false;
            let row = [];

            for (let i = 0; i < text.length; i++) {
                const char = text[i];
                const nextChar = text[i + 1];

                if (inQuotes) {
                    if (char === '"' && nextChar === '"') {
                        current += '"';
                        i++;
                    } else if (char === '"') {
                        inQuotes = false;
                    } else {
                        current += char;
                    }
                } else {
                    if (char === '"') {
                        inQuotes = true;
                    } else if (char === ',') {
                        row.push(current.trim());
                        current = '';
                    } else if (char === '\n') {
                        row.push(current.trim());
                        if (row.some(cell => cell !== '')) {
                            rows.push(row);
                        }
                        row = [];
                        current = '';
                    } else if (char === '\r') {
                        continue;
                    } else {
                        current += char;
                    }
                }
            }

            if (current || row.length > 0) {
                row.push(current.trim());
                if (row.some(cell => cell !== '')) {
                    rows.push(row);
                }
            }

            return rows;
        }

        // Tab switching
        function switchTab(tabName) {
            document.querySelectorAll('.tab-btn').forEach((btn, index) => {
                btn.classList.remove('active');
                if ((tabName === 'rankings' && index === 0) ||
                    (tabName === 'schedule' && index === 1) ||
                    (tabName === 'overview' && index === 2)) {
                    btn.classList.add('active');
                }
            });

            document.querySelectorAll('.tab-content').forEach(content => {
                content.classList.remove('active');
            });
            document.getElementById(`tab-${tabName}`).classList.add('active');
        }

        // Render Rankings
        function renderRankings(data) {
            const container = document.getElementById('rankings-content');

            if (!data || data.length === 0) {
                container.innerHTML = `
                    <div class="error-container">
                        <div class="icon">📭</div>
                        <p>Không có dữ liệu bảng xếp hạng</p>
                    </div>
                `;
                return;
            }

            // First row might be headers
            const headers = data[0];
            const rows = data.slice(1).filter(row => row.some(cell => cell !== ''));

            if (rows.length === 0) {
                container.innerHTML = `
                    <div class="error-container">
                        <div class="icon">📭</div>
                        <p>Không có dữ liệu bảng xếp hạng</p>
                    </div>
                `;
                return;
            }

            // Try to detect column structure
            // Headers might be in the first row
            let tableHeaders = headers;
            let tableRows = rows;

            // If first row looks like data (no headers), use default headers
            if (headers.some(h => !isNaN(parseFloat(h)) || h === '')) {
                tableRows = data.filter(row => row.some(cell => cell !== ''));
                tableHeaders = null;
            }

            // Default headers if not provided
            const defaultHeaders = ['XH', 'Đội/VĐV', 'Số Trận', 'Thắng', 'Thua', 'Hiệu Số', 'Điểm', 'Tỉ Lệ Thắng'];

            // Determine actual headers
            let displayHeaders = tableHeaders || defaultHeaders;

            // If first row of tableRows looks like a header, use it
            if (tableRows.length > 0) {
                const firstRow = tableRows[0];
                if (firstRow.some(cell => cell && isNaN(parseFloat(cell)) && !cell.match(/^\d/))) {
                    displayHeaders = firstRow;
                    tableRows = tableRows.slice(1);
                }
            }

            // Build podium for top 3
            let podiumHTML = '';
            const top3 = tableRows.slice(0, Math.min(3, tableRows.length));

            if (top3.length >= 3) {
                const sorted = [top3[1], top3[0], top3[2]]; // 2nd, 1st, 3rd order
                const labels = [
                    { rank: '2nd', cls: 'second', emoji: '🥈' },
                    { rank: '1st', cls: 'first', emoji: '🥇' },
                    { rank: '3rd', cls: 'third', emoji: '🥉' }
                ];

                podiumHTML = '<div class="podium">';
                for (let i = 0; i < 3; i++) {
                    const row = sorted[i];
                    const label = labels[i];
                    const name = row[1] || 'N/A';
                    const points = row[row.length - 2] || row[row.length - 1] || 'N/A';
                    const initials = name.split(' ').map(w => w[0]).join('').substring(0, 2).toUpperCase();

                    podiumHTML += `
                        <div class="podium-item ${label.cls}">
                            <div class="podium-rank">${label.emoji}</div>
                            <div class="podium-name">${name}</div>
                            <div class="podium-stat">${points} pts</div>
                        </div>
                    `;
                }
                podiumHTML += '</div>';
            }

            // Build table
            let tableHTML = `<div class="table-scroll"><table class="data-table"><thead><tr>`;
            displayHeaders.forEach(h => {
                tableHTML += `<th>${h}</th>`;
            });
            tableHTML += `</tr></thead><tbody>`;

            tableRows.forEach((row, idx) => {
                if (!row.some(cell => cell !== '')) return;

                const rank = idx + 1;
                const rankBadge = rank <= 3
                    ? `<span class="rank-badge rank-${rank}">${rank}</span>`
                    : `<span class="rank-badge rank-default">${rank}</span>`;

                const name = row[1] || '';
                const initials = name.split(' ').map(w => w[0]).join('').substring(0, 2).toUpperCase();

                tableHTML += `<tr>`;
                row.forEach((cell, colIdx) => {
                    let display = cell || '';

                    // Style the rank column
                    if (colIdx === 0) {
                        display = rankBadge;
                    }

                    // Style the name column
                    if (colIdx === 1 && name) {
                        display = `
                            <div class="player-name">
                                <div class="player-avatar">${initials}</div>
                                ${display}
                            </div>
                        `;
                    }

                    // Style numeric columns
                    if (colIdx > 1) {
                        const num = parseFloat(display);
                        if (!isNaN(num)) {
                            if (num > 0 && colIdx === 3) { // Wins
                                display = `<span class="stat-win">${display}</span>`;
                            } else if (num > 0 && colIdx === 4) { // Losses
                                display = `<span class="stat-loss">${display}</span>`;
                            } else {
                                display = `<span class="stat-value">${display}</span>`;
                            }
                        }
                    }

                    tableHTML += `<td>${display}</td>`;
                });
                tableHTML += `</tr>`;
            });

            tableHTML += `</tbody></table></div>`;

            container.innerHTML = podiumHTML + `<div class="table-wrapper">${tableHTML}</div>`;

            document.getElementById('rankings-updated').textContent =
                `Cập nhật: ${new Date().toLocaleString('vi-VN')}`;
        }

        // Render Schedule
        function renderSchedule(data) {
            const container = document.getElementById('schedule-content');

            if (!data || data.length <= 1) {
                container.innerHTML = `
                    <div class="error-container">
                        <div class="icon">📭</div>
                        <p>Không có dữ liệu lịch đấu</p>
                    </div>
                `;
                return;
            }

            const headers = data[0];
            const rows = data.slice(1).filter(row => row.some(cell => cell !== ''));

            if (rows.length === 0) {
                container.innerHTML = `
                    <div class="error-container">
                        <div class="icon">📭</div>
                        <p>Không có dữ liệu lịch đấu</p>
                    </div>
                `;
                return;
            }

            let cardsHTML = '';

            rows.forEach((row, idx) => {
                const date = row[0] || '';
                const round = row[1] || '';
                const team1 = row[2] || 'Đội A';
                const team2 = row[3] || 'Đội B';
                const time = row[4] || '';
                const court = row[5] || '';
                const status = row[6] || '';

                const dateFormatted = date ? new Date(date).toLocaleDateString('vi-VN', {
                    weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'
                }) : date;

                const initials1 = team1.split(' ').map(w => w[0]).join('').substring(0, 2).toUpperCase();
                const initials2 = team2.split(' ').map(w => w[0]).join('').substring(0, 2).toUpperCase();

                // Color coding for status
                let statusBadge = '';
                if (status.toLowerCase().includes('xong') || status.toLowerCase().includes('finish') || status.toLowerCase().includes('hoàn')) {
                    statusBadge = `<span style="color: var(--primary); font-weight: 700;">✅ Đã đấu</span>`;
                } else if (status.toLowerCase().includes('hủy') || status.toLowerCase().includes('cancel')) {
                    statusBadge = `<span style="color: #ff5252; font-weight: 700;">❌ Đã hủy</span>`;
                } else if (status.toLowerCase().includes('đang') || status.toLowerCase().includes('live')) {
                    statusBadge = `<span style="color: var(--accent); font-weight: 700;">🔴 Đang đấu</span>`;
                } else {
                    statusBadge = `<span style="color: var(--text-secondary);">⏳ Sắp diễn ra</span>`;
                }

                cardsHTML += `
                    <div class="schedule-card" style="animation-delay: ${idx * 0.1}s">
                        <div class="schedule-header">
                            <div class="match-date">${dateFormatted || 'Chưa xác định'}</div>
                            <div class="match-round">${round || 'Vòng đấu'}</div>
                        </div>
                        <div class="match-body">
                            <div class="team">
                                <div class="team-logo home">${initials1}</div>
                                <div>
                                    <div class="team-name">${team1}</div>
                                    <div class="team-record">Đội nhà</div>
                                </div>
                            </div>
                            <div class="vs-badge">VS</div>
                            <div class="team right">
                                <div class="team-logo away">${initials2}</div>
                                <div>
                                    <div class="team-name">${team2}</div>
                                    <div class="team-record">Đội khách</div>
                                </div>
                            </div>
                        </div>
                        <div class="match-info">
                            ${time ? `<div class="info-item"><span class="icon">⏰</span> ${time}</div>` : ''}
                            ${court ? `<div class="info-item"><span class="icon">🏟️</span> ${court}</div>` : ''}
                            ${status ? `<div class="info-item">${statusBadge}</div>` : ''}
                        </div>
                    </div>
                `;
            });

            container.innerHTML = cardsHTML;
            document.getElementById('schedule-updated').textContent =
                `Cập nhật: ${new Date().toLocaleString('vi-VN')}`;
        }

        // Render Overview
        function renderOverview(rankingsData, scheduleData) {
            const container = document.getElementById('overview-content');

            let statsHTML = '';

            // Calculate stats from rankings
            let totalPlayers = 0;
            let totalMatches = 0;
            let totalWins = 0;

            if (rankingsData && rankingsData.length > 1) {
                const rows = rankingsData.slice(1).filter(row => row.some(cell => cell !== ''));
                totalPlayers = rows.length;

                rows.forEach(row => {
                    const wins = parseInt(row[3]) || 0;
                    const losses = parseInt(row[4]) || 0;
                    totalWins += wins;
                    totalMatches += wins + losses;
                });
            }

            let totalScheduled = 0;
            if (scheduleData && scheduleData.length > 1) {
                totalScheduled = scheduleData.slice(1).filter(row => row.some(cell => cell !== '')).length;
            }

            statsHTML = `
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-card-label">Tổng VĐV / Đội</div>
                        <div class="stat-card-value">${totalPlayers}</div>
                        <div class="stat-card-icon">👥</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-card-label">Trận Đã Đấu</div>
                        <div class="stat-card-value">${Math.floor(totalMatches / 2)}</div>
                        <div class="stat-card-icon">🏓</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-card-label">Trận Đã Lên Lịch</div>
                        <div class="stat-card-value">${totalScheduled}</div>
                        <div class="stat-card-icon">📅</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-card-label">Tổng Chiến Thắng</div>
                        <div class="stat-card-value">${totalWins}</div>
                        <div class="stat-card-icon">🏆</div>
                    </div>
                </div>
            `;

            // Top performers
            if (rankingsData && rankingsData.length > 1) {
                const rows = rankingsData.slice(1).filter(row => row.some(cell => cell !== ''));
                if (rows.length > 0) {
                    const topTeam = rows[0];
                    const topName = topTeam[1] || 'N/A';
                    const topPoints = topTeam[topTeam.length - 2] || topTeam[topTeam.length - 1] || 'N/A';
                    const topWins = topTeam[3] || 'N/A';
                    const topWinRate = topTeam[topTeam.length - 1] || 'N/A';

                    statsHTML += `
                        <div class="table-wrapper" style="margin-bottom: 20px;">
                            <div style="padding: 20px; background: linear-gradient(135deg, #1a2332, #111827); border-bottom: 2px solid var(--accent);">
                                <h3 style="color: var(--accent); font-size: 1.1rem; text-transform: uppercase; letter-spacing: 2px;">⭐ Đội Xuất Sắc Nhất</h3>
                            </div>
                            <div style="padding: 24px; display: flex; align-items: center; gap: 20px; flex-wrap: wrap;">
                                <div style="font-size: 3rem;">🥇</div>
                                <div style="flex: 1; min-width: 200px;">
                                    <div style="font-size: 1.5rem; font-weight: 900; color: var(--accent);">${topName}</div>
                                    <div style="color: var(--text-secondary); margin-top: 5px;">
                                        ${topPoints} điểm · ${topWins} thắng · Tỷ lệ: ${topWinRate}
                                    </div>
                                </div>
                            </div>
                        </div>
                    `;
                }
            }

            // Recent matches
            if (scheduleData && scheduleData.length > 1) {
                const rows = scheduleData.slice(1).filter(row => row.some(cell => cell !== ''));
                if (rows.length > 0) {
                    statsHTML += `
                        <div class="table-wrapper">
                            <div style="padding: 20px; background: linear-gradient(135deg, #1a2332, #111827); border-bottom: 2px solid var(--primary);">
                                <h3 style="color: var(--primary); font-size: 1.1rem; text-transform: uppercase; letter-spacing: 2px;">📋 Lịch Sử Trận Đấu Gần Đây</h3>
                            </div>
                            <div style="padding: 16px;">
                    `;

                    const recent = rows.slice(-5).reverse();
                    recent.forEach(row => {
                        const date = row[0] || '';
                        const team1 = row[2] || '?';
                        const team2 = row[3] || '?';
                        const round = row[1] || '';
                        const status = row[6] || '';

                        const dateShort = date ? new Date(date).toLocaleDateString('vi-VN') : '';

                        statsHTML += `
                            <div style="display: flex; align-items: center; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid var(--border-color); flex-wrap: wrap; gap: 8px;">
                                <span style="color: var(--text-secondary); font-size: 0.85rem; min-width: 100px;">${dateShort || round}</span>
                                <span style="font-weight: 700;">${team1}</span>
                                <span style="color: var(--primary); font-weight: 800; padding: 0 10px;">VS</span>
                                <span style="font-weight: 700;">${team2}</span>
                                <span style="color: var(--text-secondary); font-size: 0.8rem;">${status}</span>
                            </div>
                        `;
                    });

                    statsHTML += `</div></div>`;
                }
            }

            container.innerHTML = statsHTML;
        }

        // Initialize
        async function init() {
            try {
                const [rankingsData, scheduleData] = await Promise.all([
                    fetchSheetData('BangXepHang', 'K2:L19'),
                    fetchSheetData('LichDauDoi', 'A1:G15')
                ]);

                renderRankings(rankingsData);
                renderSchedule(scheduleData);
                renderOverview(rankingsData, scheduleData);
            } catch (error) {
                console.error('Error loading data:', error);

                // Fallback: try fetching without range
                try {
                    const [rankingsData, scheduleData] = await Promise.all([
                        fetchSheetData('BangXepHang', ''),
                        fetchSheetData('LichDauDoi', '')
                    ]);

                    // Try to find the right data
                    if (rankingsData.length > 0) {
                        renderRankings(rankingsData);
                    } else {
                        document.getElementById('rankings-content').innerHTML = `
                            <div class="error-container">
                                <div class="icon">⚠️</div>
                                <p>Không thể tải dữ liệu bảng xếp hạng</p>
                                <p style="font-size: 0.8rem; margin-top: 10px;">${error.message}</p>
                            </div>
                        `;
                    }

                    if (scheduleData.length > 0) {
                        renderSchedule(scheduleData);
                    } else {
                        document.getElementById('schedule-content').innerHTML = `
                            <div class="error-container">
                                <div class="icon">⚠️</div>
                                <p>Không thể tải dữ liệu lịch đấu</p>
                            </div>
                        `;
                    }

                    renderOverview(rankingsData, scheduleData);
                } catch (err2) {
                    document.getElementById('rankings-content').innerHTML = `
                        <div class="error-container">
                            <div class="icon">⚠️</div>
                            <p>Không thể kết nối đến Google Sheets</p>
                            <p style="font-size: 0.8rem; margin-top: 10px;">Vui lòng kiểm tra kết nối mạng và quyền truy cập sheet</p>
                        </div>
                    `;
                    document.getElementById('schedule-content').innerHTML = `
                        <div class="error-container">
                            <div class="icon">⚠️</div>
                            <p>Không thể kết nối đến Google Sheets</p>
                        </div>
                    `;
                    document.getElementById('overview-content').innerHTML = `
                        <div class="error-container">
                            <div class="icon">⚠️</div>
                            <p>Không thể tải dữ liệu</p>
                        </div>
                    `;
                }
            }
        }

        // Run
        init();
    </script>
</body>
