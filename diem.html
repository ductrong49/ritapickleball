<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Nhập Điểm Thi Đấu</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
    background: #f1f5f9;
    color: #0f172a;
    padding-bottom: 24px;
}
.header {
    background: linear-gradient(135deg, #1e3a8a, #3b82f6);
    color: white;
    padding: 20px 16px;
    text-align: center;
    box-shadow: 0 4px 12px rgba(37,99,235,0.25);
}
.header h1 { font-size: 1.3rem; font-weight: 800; }
.header p { font-size: 0.8rem; opacity: 0.9; margin-top: 4px; }

.container { padding: 14px; max-width: 800px; margin: 0 auto; }

.group-card {
    background: white;
    border-radius: 14px;
    margin-bottom: 18px;
    overflow: hidden;
    box-shadow: 0 2px 6px rgba(0,0,0,0.06);
    border: 1px solid #e2e8f0;
}
.group-header {
    padding: 10px 16px;
    font-weight: 800;
    color: white;
    text-align: center;
    font-size: 1rem;
    letter-spacing: 0.5px;
}

.match-row {
    padding: 12px 10px;
    border-bottom: 1px solid #f1f5f9;
}
.match-row:last-child { border-bottom: none; }

.teams-display {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 8px;
    font-size: 0.9rem;
    font-weight: 600;
}
.team-name { flex: 1; line-height: 1.2; }
.team-left { text-align: left; color: #1e40af; }
.team-right { text-align: right; color: #be123c; }
.vs { margin: 0 6px; font-size: 0.75rem; color: #94a3b8; font-weight: 700; }

.inputs-wrapper {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    margin-bottom: 8px;
}
.score-in {
    width: 38px;
    height: 36px;
    font-size: 1.1rem;
    font-weight: 800;
    text-align: center;
    border: 2px solid #cbd5e1;
    border-radius: 8px;
    background: #f8fafc;
    transition: all 0.2s;
}
.score-in:focus {
    outline: none;
    border-color: #3b82f6;
    background: #eff6ff;
    box-shadow: 0 0 0 3px rgba(59,130,246,0.2);
}
.score-in.filled { border-color: #10b981; background: #ecfdf5; }

.score-sep { font-weight: 800; color: #64748b; }

.save-btn {
    width: 100%;
    padding: 9px;
    border: none;
    border-radius: 8px;
    background: #10b981;
    color: white;
    font-size: 0.85rem;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
}
.save-btn:hover { background: #059669; }
.save-btn:active { transform: scale(0.98); }
.save-btn.saving { background: #94a3b8; pointer-events: none; }
.save-btn.saved { background: #3b82f6; }

.status-text {
    text-align: center;
    font-size: 0.72rem;
    color: #64748b;
    margin-top: 6px;
    min-height: 16px;
}

.toast {
    position: fixed;
    bottom: 20px;
    left: 16px;
    right: 16px;
    background: #0f172a;
    color: white;
    padding: 12px 16px;
    border-radius: 10px;
    font-size: 0.88rem;
    font-weight: 600;
    text-align: center;
    box-shadow: 0 8px 20px rgba(0,0,0,0.25);
    opacity: 0;
    transform: translateY(15px);
    transition: all 0.25s ease;
    z-index: 9999;
    pointer-events: none;
}
.toast.show { opacity: 1; transform: translateY(0); }
.toast.success { background: #059669; }
.toast.error { background: #dc2626; }

.loading { text-align: center; padding: 30px 16px; color: #64748b; }
.spinner {
    width: 28px; height: 28px;
    border: 3px solid #e2e8f0;
    border-top-color: #3b82f6;
    border-radius: 50%;
    margin: 0 auto 10px;
    animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

@media (max-width: 400px) {
    .teams-display { font-size: 0.82rem; }
    .score-in { width: 34px; height: 34px; font-size: 1rem; }
}
</style>
</head>
<body>

<div class="header">
    <h1>🏓 Nhập Điểm Thi Đấu</h1>
    <p>Cập nhật kết quả trực tiếp</p>
</div>

<div class="container" id="app"></div>
<div class="toast" id="toast"></div>

<script>
const SHEET_ID = "11R0QRVS5-tyNEXHFJh8FJ5KxlfpCWvUQkDByaIiPPGU";
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbznxD4cQkpho4n5j0Yilm_JLns0kP12HndBN6yxh_3i74jBOV_4i8P3p9gn-fUHqg7n/exec";

const GROUPS = [
  { name: "A", color: "#2563eb", range: "B2:D8", saveStart: 3 },
  { name: "B", color: "#dc2626", range: "B11:D17", saveStart: 12 },
  { name: "C", color: "#059669", range: "B20:D26", saveStart: 21 },
  { name: "D", color: "#d97706", range: "B29:D35", saveStart: 30 }
];

function showToast(msg, type) {
    const t = document.getElementById("toast");
    t.textContent = msg;
    t.className = `toast ${type || "success"} show`;
    setTimeout(() => t.classList.remove("show"), 2200);
}

async function fetchGroup(range) {
    const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=bang&range=${encodeURIComponent(range)}`;
    const res = await fetch(url);
    const txt = await res.text();
    const json = JSON.parse(txt.substring(txt.indexOf("{"), txt.lastIndexOf("}") + 1));
    return json.table.rows;
}

function renderMatch(rowData, saveRow, groupName, groupColor) {
    const c = rowData.c;
    const t1 = (c[0] ? (c[0].f || c[0].v || "") : "");
    const t2 = (c[1] ? (c[1].f || c[1].v || "") : "");
    const current = (c[2] ? String(c[2].v || "") : "");

    let v1 = "", v2 = "";
    if (current && current.includes("-")) {
        const parts = current.split("-");
        v1 = parts[0] || "";
        v2 = parts[1] || "";
    }

    return `
    <div class="match-row" data-row="${saveRow}">
        <div class="teams-display">
            <span class="team-name team-left">${t1}</span>
            <span class="vs">VS</span>
            <span class="team-name team-right">${t2}</span>
        </div>
        <div class="inputs-wrapper">
            <input type="tel" data-row="${saveRow}" data-side="1" class="score-in ${v1?'filled':''}" value="${v1}" maxlength="2" inputmode="numeric" placeholder="0">
            <span class="score-sep">-</span>
            <input type="tel" data-row="${saveRow}" data-side="2" class="score-in ${v2?'filled':''}" value="${v2}" maxlength="2" inputmode="numeric" placeholder="0">
        </div>
        <button class="save-btn" onclick="handleSave(${saveRow}, '${groupName}')">
            💾 Lưu Bảng ${groupName}
        </button>
        ${current ? `<div class="status-text">Điểm hiện tại: <span style="color:${groupColor};font-weight:700">${current}</span></div>` : ''}
    </div>`;
}

window.handleSave = async function(row, groupName) {
    const el1 = document.querySelector(`input[data-row="${row}"][data-side="1"]`);
    const el2 = document.querySelector(`input[data-row="${row}"][data-side="2"]`);
    const btn = document.querySelector(`.match-row[data-row="${row}"] .save-btn`);

    const v1 = el1.value.trim();
    const v2 = el2.value.trim();

    if (!v1 || !v2) {
        showToast("⚠️ Vui lòng nhập đủ 2 điểm!", "error");
        return;
    }

    const scoreVal = `${v1}-${v2}`;

    btn.classList.add("saving");
    btn.innerHTML = "⏳ Đang lưu...";

    try {
        await fetch(SCRIPT_URL, {
            method: "POST",
            mode: "no-cors",
            headers: { "Content-Type": "text/plain" },
            body: JSON.stringify({ range: `D${row}`, value: scoreVal })
        });

        el1.classList.add("filled");
        el2.classList.add("filled");

        btn.classList.remove("saving");
        btn.classList.add("saved");
        btn.innerHTML = "✅ Đã lưu D" + row;

        // Update status text
        let statusEl = btn.nextElementSibling;
        if (!statusEl || !statusEl.classList.contains("status-text")) {
            const div = document.createElement("div");
            div.className = "status-text";
            btn.parentNode.appendChild(div);
            statusEl = div;
        }
        statusEl.innerHTML = `Đã lưu: <span style="font-weight:700">${scoreVal}</span>`;

        showToast(`✅ Lưu thành công ${scoreVal} → D${row}`, "success");

        setTimeout(() => {
            btn.classList.remove("saved");
            btn.innerHTML = `💾 Lưu Bảng ${groupName}`;
        }, 1500);

    } catch(err) {
        btn.classList.remove("saving");
        btn.innerHTML = "❌ Lỗi kết nối";
        showToast("❌ Không thể lưu dữ liệu", "error");
    }
};

async function init() {
    const app = document.getElementById("app");
    app.innerHTML = '<div class="loading"><div class="spinner"></div>Đang tải dữ liệu...</div>';

    try {
        const promises = GROUPS.map(g => fetchGroup(g.range));
        const results = await Promise.all(promises);

        app.innerHTML = "";

        GROUPS.forEach((cfg, i) => {
            const rows = results[i];
            // Skip header (index 0). Indices 1-6 are matches for rows 3-8, 12-17, etc.
            let html = `<div class="group-card"><div class="group-header" style="background:${cfg.color}">BẢNG ${cfg.name}</div>`;
            
            for (let j = 1; j <= 6 && j < rows.length; j++) {
                const saveRow = cfg.saveStart + (j - 1);
                html += renderMatch(rows[j], saveRow, cfg.name, cfg.color);
            }
            html += `</div>`;
            app.innerHTML += html;
        });

    } catch(err) {
        app.innerHTML = `<div class="loading" style="color:#dc2626">❌ Lỗi tải dữ liệu<br>${err.message}</div>`;
    }
}

init();
</script>
</body>
</html>
