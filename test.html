<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Nhập Điểm Thi Đấu</title>

<style>
body {
    font-family: Arial;
    margin: 0;
    background: #f5f5f5;
}

.container {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    padding: 10px;
}

.box {
    background: white;
    border-radius: 10px;
    padding: 10px;
    box-shadow: 0 2px 5px rgba(0,0,0,0.1);
}

h3 {
    text-align: center;
    margin: 5px 0 10px;
}

.row {
    display: flex;
    justify-content: space-between;
    margin-bottom: 6px;
    font-size: 14px;
}

input {
    width: 40px;
    font-size: 16px;
    text-align: center;
}

button {
    width: 100%;
    margin-top: 5px;
    padding: 6px;
    border: none;
    border-radius: 6px;
    background: #007bff;
    color: white;
}
</style>
</head>

<body>

<div class="container" id="app"></div>

<script>
const SHEET_ID = "1nb9q4tDya5jYbXOwLowxu1XH3-HHcPnCP4kNKXaymLI";
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbykQOvD-swl0yZ5Wq92c4PVXrP0A49dvgU1rkOUt8IUR_2Yaiv8CAVZWaXqUBvIVxi8hg/exec";

const configs = [
  {name:"A", start:2, saveStart:3},
  {name:"B", start:11, saveStart:12},
  {name:"C", start:20, saveStart:21},
  {name:"D", start:29, saveStart:30},
];

async function loadData() {
    const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=bang`;
    const res = await fetch(url);
    const text = await res.text();
    const json = JSON.parse(text.substr(47).slice(0, -2));
    return json.table.rows;
}

function createBox(title, rows, startRow, saveStart) {
    let html = `<div class="box"><h3>Bảng ${title}</h3>`;

    for (let i = 0; i < rows.length; i++) {
        let r = rows[i];
        let name = r.c[0]?.v || "";
        let team = r.c[1]?.v || "";
        let score = r.c[2]?.v || "";

        let rowIndex = saveStart + i;

        html += `
        <div class="row">
            <span>${name}</span>
            <input id="a${rowIndex}" type="number">
            <input id="b${rowIndex}" type="number">
        </div>
        <button onclick="saveScore(${rowIndex})">Lưu</button>
        `;
    }

    html += `</div>`;
    return html;
}

function saveScore(row) {
    let a = document.getElementById("a"+row).value;
    let b = document.getElementById("b"+row).value;

    if(a === "" || b === "") {
        alert("Nhập đủ điểm");
        return;
    }

    let value = `${a}-${b}`;

    fetch(SCRIPT_URL, {
        method: "POST",
        body: JSON.stringify({
            range: `D${row}`,
            value: value
        })
    })
    .then(r=>r.json())
    .then(()=>alert("Đã lưu"))
}

async function init() {
    const data = await loadData();
    let app = document.getElementById("app");

    configs.forEach(cfg => {
        let rows = data.slice(cfg.start-1, cfg.start-1 + 7);
        app.innerHTML += createBox(cfg.name, rows, cfg.start, cfg.saveStart);
    });
}

init();
</script>

</body>
</html>
