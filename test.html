<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HOÀNG QUỐC VIỆT PICKLEBALL</title>

<!-- Font Awesome for Icons -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
  :root {
    --primary-glow: rgba(0, 255, 255, 0.5);
    --glass-bg: rgba(20, 20, 35, 0.75);
    --glass-border: rgba(255, 255, 255, 0.1);
  }

  body {
    margin: 0;
    font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    /* Placeholder background - replace with your actual background.png if available */
    background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url("background.png"); 
    background-size: cover;
    background-position: center;
    background-attachment: fixed;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    color: white;
    padding: 20px;
    box-sizing: border-box;
  }

  /* --- TOP BAR (Weather & Time) --- */
  .top-bar {
    width: 100%;
    max-width: 800px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: var(--glass-bg);
    backdrop-filter: blur(10px);
    padding: 10px 20px;
    border-radius: 50px;
    margin-bottom: 30px;
    border: 1px solid var(--glass-border);
    box-shadow: 0 4px 15px rgba(0,0,0,0.3);
    animation: slideDown 0.8s ease-out;
  }

  .info-item {
    display: flex;
    align-items: center;
    gap: 8px;
    font-weight: 600;
    font-size: 0.95rem;
  }

  .info-item i {
    color: #ffd700;
  }

  /* --- TITLE SECTION --- */
  .title-box {
    background: var(--glass-bg);
    backdrop-filter: blur(15px);
    border-radius: 20px;
    padding: 40px 30px;
    margin-bottom: 50px;
    text-align: center;
    border: 1px solid var(--glass-border);
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    width: 100%;
    max-width: 800px;
    box-sizing: border-box;
    animation: fadeIn 1s ease-out;
  }

  /* Gradient Text Effect */
  .gradient-text {
    font-size: clamp(1.8rem, 5vw, 3.5rem);
    font-weight: 900;
    text-transform: uppercase;
    line-height: 1.2;
    margin: 0;
    
    /* The Magic Gradient */
    background: linear-gradient(
      to right, 
      #00c6ff, 
      #0072ff, 
      #00c6ff
    );
    background-size: 200% auto;
    color: transparent;
    -webkit-background-clip: text;
    background-clip: text;
    
    animation: shine 4s linear infinite;
    filter: drop-shadow(0 0 10px rgba(0, 198, 255, 0.3));
  }

  .sub-title {
    font-size: clamp(1.2rem, 3vw, 2rem);
    margin-top: 15px;
    font-weight: 300;
    letter-spacing: 2px;
    color: #e0e0e0;
  }

  .date-badge {
    display: inline-block;
    margin-top: 20px;
    padding: 8px 20px;
    background: rgba(255,255,255,0.1);
    border-radius: 30px;
    font-weight: bold;
    border: 1px solid rgba(255,255,255,0.2);
  }

  /* --- GRID CONTAINER --- */
  .container {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 30px;
    width: 100%;
    max-width: 900px;
    margin-bottom: 50px;
  }

  .item {
    background: var(--glass-bg);
    border: 1px solid var(--glass-border);
    border-radius: 20px;
    padding: 20px;
    text-align: center;
    transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    cursor: pointer;
    text-decoration: none; /* No underline */
    color: white;
    position: relative;
    overflow: hidden;
  }

  .item:hover {
    transform: translateY(-10px);
    box-shadow: 0 15px 30px rgba(0,0,0,0.4);
    border-color: rgba(255,255,255,0.4);
    background: rgba(40, 40, 60, 0.85);
  }

  .item img {
    width: 100%;
    height: 220px;
    object-fit: contain; /* Keeps aspect ratio of 48.png and 52.png intact */
    border-radius: 15px;
    margin-bottom: 15px;
    filter: drop-shadow(0 5px 15px rgba(0,0,0,0.3));
    transition: transform 0.3s;
  }

  .item:hover img {
    transform: scale(1.05);
  }

  .label {
    font-size: 1.4rem;
    font-weight: 700;
    margin-top: 10px;
    text-shadow: 0 2px 4px rgba(0,0,0,0.5);
  }

  /* --- FOOTER LINK --- */
  .footer-link {
    margin-top: auto;
    padding-bottom: 20px;
  }

  .btn-facebook {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    background: #1877f2;
    color: white;
    padding: 15px 30px;
    border-radius: 50px;
    font-weight: bold;
    font-size: 1.1rem;
    text-decoration: none; /* Explicitly no underline */
    box-shadow: 0 4px 15px rgba(24, 119, 242, 0.4);
    transition: all 0.3s ease;
  }

  .btn-facebook:hover {
    background: #0f5fd1;
    transform: scale(1.05);
    box-shadow: 0 6px 20px rgba(24, 119, 242, 0.6);
  }

  /* Animations */
  @keyframes shine {
    to {
      background-position: 200% center;
    }
  }

  @keyframes slideDown {
    from { opacity: 0; transform: translateY(-20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: scale(0.95); }
    to { opacity: 1; transform: scale(1); }
  }

  /* Responsive */
  @media (max-width: 600px) {
    .top-bar {
      flex-direction: column;
      gap: 10px;
      border-radius: 20px;
    }
    .container {
      grid-template-columns: 1fr;
    }
  }
</style>

</head>
<body>

<!-- TOP BAR: Weather & Time -->
<div class="top-bar">
  <div class="info-item">
    <i class="fas fa-clock"></i>
    <span id="clock">00:00:00</span>
  </div>
  <div class="info-item">
    <i class="fas fa-cloud-sun"></i>
    <span id="weather">Đức Trọng: <span id="temp-display">--°C</span></span>
  </div>
</div>

<!-- MAIN TITLE -->
<div class="title-box">
  <h1 class="gradient-text">HOÀNG QUỐC VIỆT<br>PICKLEBALL</h1>
  <div class="sub-title">PICKLEBALL CUP</div>
  <div class="date-badge">
    <i class="far fa-calendar-alt"></i> 02/05/2026
  </div>
</div>

<!-- GRID CONTENT -->
<div class="container">

  <!-- Item 1 -->
  <a href="https://ductrong49.github.io/ritapickleball/hqv_4.2.html" class="item">
    <!-- Using 48.png as requested (assuming it's in the same folder) -->
    <img src="48.png" alt="Giải đấu trình 4.2" onerror="this.src='https://via.placeholder.com/300x300?text=4.2+Tournament'">
    <div class="label">Giải đấu trình 4.2</div>
  </a>

  <!-- Item 2 -->
  <a href="https://ductrong49.github.io/ritapickleball/hqv_5.2.html" class="item">
    <!-- Using 52.png as requested -->
    <img src="52.PNG" alt="Giải đấu trình 5.2" onerror="this.src='https://via.placeholder.com/300x300?text=5.2+Tournament'">
    <div class="label">Giải đấu trình 5.2</div>
  </a>

</div>

<!-- FOOTER LINK -->
<div class="footer-link">
  <a href="https://www.facebook.com/share/g/18JyDiVbt4/?mibextid=wwXIfr" class="btn-facebook" target="_blank">
    <i class="fab fa-facebook-f"></i>
    TRANG CỘNG ĐỒNG PICKLEBALL
  </a>
</div>

<script>
  // 1. Real-time Clock
  function updateClock() {
    const now = new Date();
    const timeString = now.toLocaleTimeString('vi-VN', { hour12: false });
    document.getElementById('clock').textContent = timeString;
  }
  setInterval(updateClock, 1000);
  updateClock();

  // 2. Weather Simulation for Duc Trong, Lam Dong
  // Note: Real weather APIs require a backend or API key exposure. 
  // This script simulates a realistic temperature for Duc Trong (highland climate).
  function simulateWeather() {
    // Typical temp in Duc Trong ranges 18-24°C
    const baseTemp = 22; 
    const variation = Math.floor(Math.random() * 5) - 2; // -2 to +2
    const currentTemp = baseTemp + variation;
    
    document.getElementById('temp-display').textContent = `${currentTemp}°C`;
  }
  
  // Initialize weather on load
  window.addEventListener('load', simulateWeather);
</script>

</body>
</html>
