<!DOCTYPE html>

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
  body{
    margin:0;
    font-family:Arial, sans-serif;
    background:url("image3.jpg") center/cover fixed;
    padding:20px;
  }

  h1{
    text-align:center;
    color:white;
    text-shadow:2px 2px 4px #000;
    margin:0 0 6px 0;
    font-size: clamp(20px, 4vw, 40px);
  }
  h2.title{
    text-align:center;
    color:white;
    margin:0 0 18px 0;
    font-size: clamp(16px, 3vw, 28px);
    text-shadow:2px 2px 4px #000;
  }

  .link-bar{
    text-align:left;
    margin:0 0 12px 0;
  }
  .link-bar a{
    color:#000;
    font-weight:bold;
    margin-right:15px;
    text-decoration:none;
  }
  .link-bar a:hover{
    text-decoration:underline;
  }

  .block{
    background:#ffffffdd;
    padding:12px;
    border-radius:10px;
    margin-bottom:20px;
    border:2px solid #444;
  }

  table{
    width:100%;
    border-collapse:collapse;
    margin-bottom:8px;
  }

  td{
    border:1px solid #444;
    padding:6px 8px;
    word-break: break-word;
    font-size: clamp(8px, 1.4vw, 18px);
  }

  .section-title{
    padding:8px;
    font-weight:700;
    background:#eee;
    margin:10px 0;
    border-left:5px solid #333;
    font-size: clamp(14px, 1.6vw, 20px);
  }

  .doi-scroll{
    display:flex;
    gap:12px;
    overflow-x:auto;
    padding:8px 0;
  }
  .doi-card{
    min-width:160px;
    background:#fff;
    border-radius:8px;
    padding:8px;
    border:1px solid #ccc;
  }

  /* SƠ ĐỒ */
  .sodo-wrapper{
    overflow:auto;
    width:100%;
    height:500px;
    border:1px solid #ccc;
  }
  .sodo-wrapper iframe{
    width:1200px; /* có thể tăng nếu sơ đồ rộng */
    height:800px;
    border:none;
  }
</style>

<script src="https://www.gstatic.com/charts/loader.js"></script>
<script>
google.charts.load('current', {'packages':['table']});

const SHEET_ID = "1j0hw9jfG6d2KcPP7r6qrgjf2zFMDjZNieYKCjOaFpls";

function loadSheetPromise(sheetName, range){
  return new Promise((resolve) => {
    const q = new google.visualization.Query(
      `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?sheet=${encodeURIComponent(sheetName)}&range=${encodeURIComponent(range)}`
    );
    q.send(res=>{
      if(res.isError()){
        resolve(null);
      } else {
        resolve(res.getDataTable());
      }
    });
  });
}

function tableToHTML(data, sheetName=""){
  if(!data) return '<div style="padding:8px;color:#a00">Không thể tải dữ liệu</div>';

  let html = "<table><tbody>";

  for(let r=0;r<data.getNumberOfRows();r++){
    html += "<tr>";
    for(let c=0;c<data.getNumberOfColumns();c++){
      let cell = data.getFormattedValue(r,c) ?? "";

      if (["bang","1.8","bk"].includes(sheetName) && (c === 2 || c === 3)) {
        cell = cell.toString().replace(/ - /g, "<br>");
      }

      html += `<td>${cell}</td>`;
    }
    html += "</tr>";
  }

  html += "</tbody></table>";
  return html;
}

async function loadDoiOrdered(){
  const ranges = [
    {range:"A1:B5", label:"Bảng A"},
    {range:"A7:B11", label:"Bảng B"},
    {range:"A13:B17", label:"Bảng C"},
    {range:"A19:B23", label:"Bảng D"}
  ];

  let html = '<div class="doi-scroll">';
  for(const r of ranges){
    const data = await loadSheetPromise("doi", r.range);
    html += `<div class="doi-card"><div class="section-title" style="margin:0 0 8px 0">${r.label}</div>`;
    html += tableToHTML(data, "doi");
    html += '</div>';
  }
  html += '</div>';

  document.getElementById('sheet-doi').innerHTML = html;
}

async function loadBangOrdered(){
  const ranges = [
    {range:"A2:G8", label:"BẢNG A"},
    {range:"A11:G17", label:"BẢNG B"},
    {range:"A20:G26", label:"BẢNG C"},
    {range:"A29:G35", label:"BẢNG D"}
  ];

  let html = "";
  for(const r of ranges){
    const data = await loadSheetPromise("bang", r.range);
    html += `<div class="section-title">${r.label}</div>`;
    html += tableToHTML(data, "bang");
  }
  document.getElementById('sheet-bang').innerHTML = html;
}

async function loadOtherSheets(){
  const data18 = await loadSheetPromise("1.8","A1:E12");
  document.getElementById('sheet-18').innerHTML = tableToHTML(data18, "1.8");

  const databk = await loadSheetPromise("bk","A1:D7");
  document.getElementById('sheet-bk').innerHTML = tableToHTML(databk, "bk");

  const datack = await loadSheetPromise("ck","A2:C4");
  document.getElementById('sheet-ck').innerHTML = tableToHTML(datack, "ck");
}

async function reloadAllOrdered(){
  await loadDoiOrdered();
  await loadBangOrdered();
  await loadOtherSheets();
}

google.charts.setOnLoadCallback(()=>{
  reloadAllOrdered();
  setInterval(reloadAllOrdered, 15000);
});
</script>
</head>
<body>
